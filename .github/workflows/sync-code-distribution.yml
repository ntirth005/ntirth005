name: Sync Code Distribution

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Aggregate code distribution into README
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          # Use a PAT in this secret if you want private repos included.
          # For public repos only, GITHUB_TOKEN is usually enough.
          GITHUB_TOKEN: ${{ secrets.CODE_DISTRIBUTION_TOKEN || github.token }}
          DISTRIBUTION_FILE_PATH: .github/code-distribution.json
          INCLUDE_FORKS: "false"
        run: python scripts/update_code_distribution.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync code distribution"
          git push
